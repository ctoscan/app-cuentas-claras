<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APP Cuentas Claras</title>

<link rel="stylesheet" href="styles.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c7be5">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- ICONOS -->
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="shortcut icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">

</head>

<body>

<header>
<h1>💰 Cuentas Claras</h1>
<p>Control simple de gastos diarios</p>

<button id="instalarApp" style="display:none;">
📲 Instalar App
</button>

</header>

<section class="formulario">

<h2>Registrar gasto</h2>

<input type="number" id="monto" placeholder="Monto $" />

<select id="categoria">

<option value="">Seleccionar categoría</option>
<option value="Carnicería">Carnicería</option>
<option value="Verdulería">Verdulería</option>
<option value="Supermercado">Supermercado</option>
<option value="PedidosYa">PedidosYa</option>
<option value="Transporte">Transporte</option>
<option value="Otros">Otros</option>

</select>

<button id="guardar">Guardar gasto</button>

</section>

<section class="resumen">

<h2>Total del mes</h2>

<div id="total">$0</div>

</section>

<section class="lista">

<h2>Gastos registrados</h2>

<ul id="lista-gastos"></ul>

</section>

<section class="grafico">

<h2>Gastos por categoría</h2>

<canvas id="graficoGastos"></canvas>

</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

<script>

if ('serviceWorker' in navigator) {

window.addEventListener('load', () => {

navigator.serviceWorker.register('./service-worker.js')
.then(reg => console.log("Service Worker registrado:", reg))
.catch(err => console.log("Error SW:", err));

});

}

</script>

<script>

let deferredPrompt;
const botonInstalar = document.getElementById("instalarApp");

window.addEventListener("beforeinstallprompt", (e) => {

e.preventDefault();
deferredPrompt = e;
botonInstalar.style.display = "inline-block";

});

botonInstalar.addEventListener("click", async () => {

botonInstalar.style.display = "none";

deferredPrompt.prompt();

const { outcome } = await deferredPrompt.userChoice;

console.log("Resultado instalación:", outcome);

deferredPrompt = null;

});

</script>

</body>
</html>
