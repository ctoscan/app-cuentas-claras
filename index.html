<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APP Cuentas Claras</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Manifest PWA -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#2c7be5">

</head>

<body>

<div class="barra-superior">
    <span id="hora-actual"></span>
    <span id="fecha-actual"></span>
</div>

<header>
<h1>
<img src="icons/icon-192.png" class="logo-app">
Cuentas Claras
</h1>
<p>Control simple de gastos diarios</p>
</header>
  
<!-- =========================================
BOTON INSTALAR APP
Permite instalar la PWA manualmente
========================================= -->

<section class="instalar-app">

<button id="instalarApp" style="display:none;">
📲 Instalar Cuentas Claras
</button>

</section>

<section class="formulario">

<h2>Registrar gasto</h2>

<input type="number" id="monto" placeholder="Monto $" />

<select id="categoria">

<option value="">Seleccionar categoría</option>
<option value="Carniceria">Carniceria</option>
<option value="Verduleria">Verduleria</option>
<option value="Polleria">Polleria</option>
<option value="Supermercado">Supermercado</option>
<option value="Transporte">Transporte</option>
<option value="PedidosYa">PedidosYa</option>
<option value="Servicios">Servicios</option>
<option value="Entretenimiento">Entretenimiento</option>
<option value="Farmacia">Farmacia</option>
<option value="Veterinaria">Veterinaria</option>
<option value="Heladeria">Heladeria</option>
<option value="Uber">Uber</option>
<option value="Otros">Otros</option>

</select>

<button id="guardar">Guardar gasto</button>

</section>


<section class="resumen">

<h2>Total del mes</h2>

<div id="total">$0</div>

</section>


<section class="lista">

<h2>Gastos registrados</h2>

<ul id="lista-gastos">

</ul>

</section>


<section class="grafico">

<h2>Gastos por categoría</h2>

<canvas id="graficoGastos"></canvas>

</section>

<!-- =========================================
EXPORTAR A EXCEL
========================================= -->

<section class="exportar">

<button id="exportarExcel">
Exportar gastos a Excel
</button>

</section>

<!--* Chart.js v4.x - descargado desde CDN *-->

<script src="libs/chart.js"></script>
<script src="app.js"></script>
  
<!-- =========================================
REGISTRO DEL SERVICE WORKER
Permite que la app funcione como PWA
========================================= -->
<script>

if ('serviceWorker' in navigator) {

  window.addEventListener('load', () => {

    navigator.serviceWorker.register('service-worker.js')
    .then(reg => console.log("Service Worker registrado", reg))
    .catch(err => console.log("Error registrando Service Worker", err));

  });

}

</script>
  
<!-- =========================================
EVENTO INSTALACION PWA
Captura el evento beforeinstallprompt
========================================= -->

<script>

let deferredPrompt;

const botonInstalar = document.getElementById("instalarApp");

window.addEventListener("beforeinstallprompt", (e) => {

    e.preventDefault();

    deferredPrompt = e;

    botonInstalar.style.display = "block";

});

botonInstalar.addEventListener("click", async () => {

    botonInstalar.style.display = "none";

    deferredPrompt.prompt();

    const { outcome } = await deferredPrompt.userChoice;

    if (outcome === "accepted") {
        console.log("Usuario aceptó instalar la app");
    }

    deferredPrompt = null;

});

</script>

<!-- =========================================
DETECCION DE INSTALACION PWA
Permite mostrar la opcion de instalar app
========================================= -->
<script>

window.addEventListener('beforeinstallprompt', (e) => {

  console.log("Instalación PWA disponible");

  e.preventDefault();

  deferredPrompt = e;

});

</script>

</body>

</html>
